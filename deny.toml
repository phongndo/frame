[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.93
allow = ["Apache-2.0", "CC0-1.0", "ISC", "MIT", "Unicode-3.0", "Zlib"]

[bans]
